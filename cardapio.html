<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zap Delivery</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 20px;
  color: orange;
  font-weight: bold;
}

.carrinho-btn {
  position: relative;
  cursor: pointer;
}

.badge {
  position: absolute;
  top: -6px;
  right: -8px;
  background: #ff3d00;
  border-radius: 50%;
  padding: 4px 7px;
  font-size: 12px;
}

/* PRODUTOS */
.container {
  padding: 20px;
}

.produto {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(145deg,#1a1a1a,#111);
  padding: 12px;
  border-radius: 14px;
  margin-bottom: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.produto:hover {
  transform: translateY(-3px);
}

.produto img {
  width: 65px;
  height: 65px;
  border-radius: 12px;
}

.info {
  flex: 1;
  margin-left: 12px;
}

.nome {
  font-weight: 600;
}

.preco {
  font-size: 14px;
  color: #aaa;
}

/* CONTROLES */
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.controls button {
  width: 32px;
  height: 32px;
  border: none;
  background: orange;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.controls button:hover {
  transform: scale(1.1);
}

/* CARRINHO LATERAL */
.carrinho {
  position: fixed;
  right: -100%;
  top: 0;
  width: 320px;
  height: 100%;
  background: #111;
  border-left: 1px solid #222;
  padding: 20px;
  transition: 0.3s;
  display: flex;
  flex-direction: column;
}

.carrinho.active {
  right: 0;
}

.carrinho h2 {
  margin-bottom: 15px;
}

.lista {
  flex: 1;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}

.finalizar {
  margin-top: 10px;
  padding: 12px;
  border: none;
  background: linear-gradient(90deg,#00c853,#00e676);
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* ANIMAÇÃO */
.flash {
  animation: flash 0.3s;
}

@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<header>
  <div class="logo">🍔 Zap Delivery</div>
  <div class="carrinho-btn" onclick="toggleCarrinho()">
    🛒 <span class="badge" id="badge">0</span>
  </div>
</header>

<div class="container">

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <div class="info">
      <div class="nome">X-Burger</div>
      <div class="preco">R$ 15</div>
    </div>
    <div class="controls">
      <button onclick="remover('X-Burger')">-</button>
      <span id="qtd-X-Burger">0</span>
      <button onclick="adicionar('X-Burger',15)">+</button>
    </div>
  </div>

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <div class="info">
      <div class="nome">X-Tudo</div>
      <div class="preco">R$ 20</div>
    </div>
    <div class="controls">
      <button onclick="remover('X-Tudo')">-</button>
      <span id="qtd-X-Tudo">0</span>
      <button onclick="adicionar('X-Tudo',20)">+</button>
    </div>
  </div>

</div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
  <h2>🛒 Pedido</h2>
  <div class="lista" id="lista"></div>
  <div class="total" id="total"></div>
  <button class="finalizar">Finalizar Pedido</button>
</div>

<script>
let carrinho = {};

function adicionar(nome, preco) {
  if (!carrinho[nome]) carrinho[nome] = { qtd: 0, preco };
  carrinho[nome].qtd++;

  document.getElementById("badge").classList.add("flash");
  setTimeout(()=>document.getElementById("badge").classList.remove("flash"),300);

  atualizar();
}

function remover(nome) {
  if (!carrinho[nome]) return;
  carrinho[nome].qtd--;
  if (carrinho[nome].qtd <= 0) delete carrinho[nome];
  atualizar();
}

function atualizar() {
  let total = 0;
  let itens = 0;
  let html = "";

  for (let item in carrinho) {
    let { qtd, preco } = carrinho[item];
    total += qtd * preco;
    itens += qtd;

    document.getElementById(`qtd-${item}`).innerText = qtd;

    html += `<div class="item">
      ${item} x${qtd}
      <span>R$ ${qtd * preco}</span>
    </div>`;
  }

  document.getElementById("lista").innerHTML = html;
  document.getElementById("total").innerText = "Total: R$ " + total;
  document.getElementById("badge").innerText = itens;
}

function toggleCarrinho() {
  document.getElementById("carrinho").classList.toggle("active");
}
</script>

</body>
</html>
