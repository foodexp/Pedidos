<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Conta Confirmada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #1c1c1c);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #222;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255, 165, 0, 0.2);
      max-width: 400px;
    }

    .icon {
      font-size: 60px;
      color: #00ff88;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;
      background: orange;
      color: black;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #ff9900;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon">✅</div>
    <h1>Email confirmado!</h1>
    <p>Sua conta foi ativada com sucesso. Agora você já pode fazer login e pedir seu lanche 🍔</p>

    <a href="index.html">Ir para o login</a>
  </div>

</body>
</html>
